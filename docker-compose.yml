services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wibs-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
    volumes:
      - laravel_storage:/var/www/html/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wibs-queue
    restart: unless-stopped
    env_file:
      - .env
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - laravel_storage:/var/www/html/storage
    depends_on:
      - app

volumes:
  laravel_storage: